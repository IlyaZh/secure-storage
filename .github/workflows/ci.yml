name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Restore Dependencies
      run: dotnet restore backend/src/SecureStorage.csproj

    - name: Restore Test Dependencies
      run: dotnet restore backend/tests/SecureStorage.Tests/SecureStorage.Tests.csproj

    - name: Build Source
      run: dotnet build backend/src/SecureStorage.csproj --no-restore

    - name: Build Tests
      run: dotnet build backend/tests/SecureStorage.Tests/SecureStorage.Tests.csproj --no-restore

    - name: Run Tests
      run: dotnet test backend/tests/SecureStorage.Tests/SecureStorage.Tests.csproj --no-build --verbosity normal

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Convert Repository Owner to Lowercase
      id: prep
      run: |
        echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
      env:
        OWNER: ${{ github.repository_owner }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Backend Docker Image
      uses: docker/build-push-action@v7
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        tags: |
          ghcr.io/${{ steps.prep.outputs.owner }}/secure-storage-backend:latest
          ghcr.io/${{ steps.prep.outputs.owner }}/secure-storage-backend:${{ github.ref_name }}
          ghcr.io/${{ steps.prep.outputs.owner }}/secure-storage-backend:${{ github.sha }}
